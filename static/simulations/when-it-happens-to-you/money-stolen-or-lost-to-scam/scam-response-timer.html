<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scam Response Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #0F172A;
    --muted: #64748B;
    --blue: #2563EB;
    --green: #059669;
    --red: #DC2626;
    --amber: #B45309;
    --purple: #7C3AED;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1.5rem 1rem 3rem;
  }

  .wrap { max-width: 680px; margin: 0 auto; }

  .header { margin-bottom: 1.25rem; }
  .header h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }

  .selector-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.25rem;
  }

  @media (max-width: 480px) {
    .selector-row { grid-template-columns: 1fr; }
  }

  .selector-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .selector-block .sel-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--blue); color: var(--blue); }
  .pill.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* Recovery likelihood bar */
  .likelihood-bar {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .likelihood-bar.visible { display: block; }

  .likelihood-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .likelihood-label {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .likelihood-track {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .likelihood-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .likelihood-note {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Action checklist */
  .action-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .action-panel.visible { display: block; }

  .action-panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .action-panel-header h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .action-panel-header p {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .action-item {
    padding: 14px 18px;
    border-bottom: 1px solid var(--bg);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .action-item:last-child { border-bottom: none; }

  .priority-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 110px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .priority-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    min-width: 6px;
  }

  .p1 { background: #FEF2F2; color: var(--red); }
  .p1 .priority-dot { background: var(--red); }
  .p2 { background: #FFF7ED; color: var(--amber); }
  .p2 .priority-dot { background: var(--amber); }
  .p3 { background: #EFF6FF; color: var(--blue); }
  .p3 .priority-dot { background: var(--blue); }
  .p4 { background: #F0FDF4; color: var(--green); }
  .p4 .priority-dot { background: var(--green); }

  .action-content .action-title {
    font-size: 0.875rem;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .action-content .action-detail {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .action-content .action-contact {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--blue);
  }

  .time-warning {
    display: none;
    background: #FFF7ED;
    border: 1px solid #FED7AA;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 12px;
    font-size: 0.82rem;
    color: #92400E;
    line-height: 1.5;
  }

  .time-warning.visible { display: block; }
  .time-warning strong { font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>Scam Response Timer</h1>
    <p>Select your payment method and how long ago the loss occurred. Get a time-critical action checklist with specific contacts.</p>
  </div>

  <div class="selector-row">
    <div class="selector-block">
      <div class="sel-label">Payment Method</div>
      <div class="pill-group" id="method-pills">

        <button class="pill" onclick="selectMethod('bank', this)">Bank Transfer</button>
        <button class="pill" onclick="selectMethod('card', this)">Credit/Debit Card</button>
        <button class="pill" onclick="selectMethod('crypto', this)">Crypto</button>
        <button class="pill" onclick="selectMethod('gift', this)">Cash/Gift Cards</button>
      </div>
    </div>
    <div class="selector-block">
      <div class="sel-label">Time Since Loss</div>
      <div class="pill-group" id="time-pills">
        <button class="pill" onclick="selectTime('under1', this)">Under 1 hour</button>
        <button class="pill" onclick="selectTime('1to24', this)">1-24 hours</button>
        <button class="pill" onclick="selectTime('1to3days', this)">1-3 days</button>
        <button class="pill" onclick="selectTime('over3days', this)">Over 3 days</button>
      </div>
    </div>
  </div>

  <div class="time-warning" id="time-warning"></div>

  <div class="likelihood-bar" id="likelihood-bar">
    <div class="likelihood-title">Recovery Likelihood</div>
    <div class="likelihood-label" id="likelihood-label">-</div>
    <div class="likelihood-track">
      <div class="likelihood-fill" id="likelihood-fill"></div>
    </div>
    <div class="likelihood-note" id="likelihood-note"></div>
  </div>

  <div class="action-panel" id="action-panel">
    <div class="action-panel-header">
      <h2>Your Action Checklist</h2>
      <p id="panel-subtitle">Prioritised steps based on your payment method and time elapsed.</p>
    </div>
    <div id="action-list"></div>
  </div>

</div>

function selectMethod(method, btn) {
  selectedMethod = method;
  document.querySelectorAll('#method-pills .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tryRender();
}

function selectTime(time, btn) {
  selectedTime = time;
  document.querySelectorAll('#time-pills .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tryRender();
}

function tryRender() {
  if (!selectedMethod || !selectedTime) return;

  const lk = LIKELIHOOD[selectedMethod][selectedTime];
  const actions = ACTIONS[selectedMethod][selectedTime];
  const warning = TIME_WARNINGS[selectedTime];

  // Time warning
  const warnEl = document.getElementById('time-warning');
  if (warning) {
    warnEl.innerHTML = warning;
    warnEl.classList.add('visible');
  } else {
    warnEl.classList.remove('visible');
  }

  // Likelihood bar
  const lkBar = document.getElementById('likelihood-bar');
  document.getElementById('likelihood-label').textContent = lk.label;
  document.getElementById('likelihood-label').style.color = lk.color;
  document.getElementById('likelihood-fill').style.width = lk.pct + '%';
  document.getElementById('likelihood-fill').style.background = lk.color;
  document.getElementById('likelihood-note').textContent = lk.note;
  lkBar.classList.add('visible');

  // Actions
  const methodLabels = { upi: 'UPI', bank: 'Bank Transfer', card: 'Credit/Debit Card', crypto: 'Crypto', gift: 'Cash/Gift Cards' };
  const timeLabels = { under1: 'Under 1 hour ago', '1to24': '1-24 hours ago', '1to3days': '1-3 days ago', over3days: 'Over 3 days ago' };
  document.getElementById('panel-subtitle').textContent = `Payment method: ${methodLabels[selectedMethod]} · Loss: ${timeLabels[selectedTime]}`;

  const list = document.getElementById('action-list');
  list.innerHTML = actions.map((a, i) => `
    <div class="action-item">
      <div>
        <div class="priority-badge ${a.p}" style="margin-bottom:6px;">
          <div class="priority-dot"></div>
          Priority ${i + 1} · ${a.time}
        </div>
      </div>
      <div class="action-content">
        <div class="action-title">${a.title}</div>
        <div class="action-detail">${a.detail}</div>
        <div class="action-contact">${a.contact}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('action-panel').classList.add('visible');
  sendHeight();
}

function sendHeight() {
  setTimeout(() => {
    if (window.parent) {
      window.parent.postMessage({ iframeHeight: document.body.scrollHeight + 40 }, '*');
    }
  }, 100);
}

window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);
</script>
