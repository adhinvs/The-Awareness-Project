<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Storm Simulator</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #e2e8f0;
            --accent-red: #ef4444;
            --accent-orange: #f97316;
            --accent-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 680px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Simulation Canvas - Redesigned to Light Workspace / Smartphone View */
        .simulation-canvas {
            background: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 16px 16px;
            border-radius: 12px;
            height: 380px;
            position: relative;
            overflow-y: auto;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Thought Bubble Element */
        .thought-bubble {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fef08a;
            color: #713f12;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 10;
            display: none;
            animation: bounce 2s infinite;
            border: 1px solid #eab308;
            text-align: center;
            max-width: 85%;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translate(-50%, 0);
            }

            50% {
                transform: translate(-50%, -6px);
            }
        }

        /* Notification Blueprint Cards */
        .notification {
            background: var(--panel-bg);
            border-radius: 10px;
            padding: 12px 14px;
            color: #0f172a;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border-color);
            border-left: 5px solid #64748b;
        }

        .notification.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .notification-icon {
            font-size: 1.25rem;
            padding-top: 2px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .notification-app {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #64748b;
        }

        .notification-time {
            font-size: 0.72rem;
            color: #94a3b8;
        }

        .notification-title {
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .notification-body {
            font-size: 0.82rem;
            color: #334155;
            line-height: 1.4;
        }

        .notification-link {
            color: var(--accent-blue);
            text-decoration: underline;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-top: 4px;
        }

        /* Target Border Signatures based on type */
        .notif-email {
            border-left-color: var(--accent-orange);
        }

        .notif-sms {
            border-left-color: #10b981;
        }

        .notif-bank {
            border-left-color: var(--accent-red);
        }

        .notif-sys {
            border-left-color: #8b5cf6;
        }

        /* Control Actions Panel */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .btn:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text-main);
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .feedback-box {
            margin-top: 16px;
            padding: 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: none;
        }

        .feedback-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .feedback-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="header">
            <h2>The Notification Storm</h2>
            <p>Experience how attackers stack urgency across multiple delivery paths to induce functional paralysis and
                force hasty decisions.</p>
        </div>

        <div class="simulation-canvas" id="canvas">
            <div class="thought-bubble" id="bubble">"Which one do I deal with first?!"</div>
            <!-- Notifications will spawn dynamically here -->
        </div>

        <div class="control-panel" id="controls">
            <button class="btn" onclick="startStorm()">Trigger Notification Sequence</button>
        </div>

        <div class="feedback-box" id="feedback"></div>
    </div>

    <script>
        function sendHeightUpdate() {
            const height = document.body.scrollHeight;
            window.parent.postMessage({ iframeHeight: height }, '*');
        }

        window.addEventListener('load', () => { sendHeightUpdate(); });

        const canvas = document.getElementById('canvas');
        const bubble = document.getElementById('bubble');
        const controls = document.getElementById('controls');
        const feedback = document.getElementById('feedback');

        const notificationsData = [
            {
                app: "Email Client",
                time: "Just Now",
                icon: "📧",
                title: "Security Flag: Password Modified",
                body: "Your primary account password was changed from an unrecognized IP address in Moscow, Russia.",
                class: "notif-email"
            },
            {
                app: "Messages",
                time: "Just Now",
                icon: "💬",
                title: "BANK ALERT: Auth Code 8173",
                body: "Use code 8173 to authorize the withdrawal of $1,420.00 to crypto checkout wire. If this wasn't you, report instantly.",
                class: "notif-sms"
            },
            {
                app: "Capital Shield Bank",
                time: "Just Now",
                icon: "🏦",
                title: "⚠️ Fraud Detection Isolation",
                body: "Suspicious checkout transaction detected. Your funds are frozen pending identity confirmation verification.",
                class: "notif-bank"
            },
            {
                app: "System OS Alert",
                time: "Just Now",
                icon: "🛑",
                title: "CRITICAL BREACH WARNING",
                body: "Unauthorized external extraction signature found accessing local files. To protect assets immediately, <span class='notification-link' onclick='clickFakeLink(event)'>Secure Your Wallet Node Here</span>.",
                class: "notif-sys"
            }
        ];

        let currentStep = 0;

        function startStorm() {
            canvas.querySelectorAll('.notification').forEach(el => el.remove());
            feedback.style.display = 'none';
            currentStep = 0;

            controls.innerHTML = `<button class="btn btn-secondary" disabled>Processing Alerts...</button>`;
            sendHeightUpdate();

            spawnNextNotification();
        }

        function spawnNextNotification() {
            if (currentStep < notificationsData.length) {
                const data = notificationsData[currentStep];

                const notif = document.createElement('div');
                notif.className = `notification ${data.class}`;
                notif.innerHTML = `
          <div class="notification-icon">${data.icon}</div>
          <div class="notification-content">
            <div class="notification-meta">
              <span class="notification-app">${data.app}</span>
              <span class="notification-time">${data.time}</span>
            </div>
            <div class="notification-title">${data.title}</div>
            <div class="notification-body">${data.body}</div>
          </div>
        `;

                canvas.appendChild(notif);
                notif.offsetHeight;
                notif.classList.add('visible');
                canvas.scrollTop = canvas.scrollHeight;

                if (currentStep === 2) {
                    bubble.style.display = 'block';
                }

                currentStep++;
                setTimeout(spawnNextNotification, 1400);
            } else {
                displayFinalChoices();
            }
        }

        function displayFinalChoices() {
            controls.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%;">
          <button class="btn btn-secondary" onclick="chooseResolution('freeze')">Option A: Stop moving, ignore alerts, and check your banking app directly via another device.</button>
          <button class="btn btn-secondary" onclick="chooseResolution('panic')">Option B: Work down the list fast—click whatever button stops the extraction alert immediately.</button>
        </div>
      `;
            setTimeout(sendHeightUpdate, 50);
        }

        function clickFakeLink(e) {
            e.stopPropagation();
            feedback.className = "feedback-box feedback-danger";
            feedback.innerHTML = `
        <strong>❌ Hijack Payload Executed:</strong> You clicked the fake defensive link embedded directly inside the noise loop! 
        When social engineers flood your targets with simultaneous alarms, they count on you clicking the easiest escape route simply to make the panic stop.
      `;
            feedback.style.display = "block";
            resetSimulationInterface();
        }

        function chooseResolution(type) {
            if (type === 'freeze') {
                feedback.className = "feedback-box feedback-success";
                feedback.innerHTML = `
          <strong>✅ Strategic Defense Maintained:</strong> Perfect choice. When a system drops multiple compounding crisis updates, the safest move is to break the loop entirely. 
          Stepping outside the noise framework and checking assets via a known safe device neutralizes the attacker's leverage completely.
        `;
                bubble.style.display = 'none';
            } else {
                feedback.className = "feedback-box feedback-danger";
                feedback.innerHTML = `
          <strong>❌ Vulnerability Exploited:</strong> Rushing to clear alerts out of pure panic plays directly into the attacker's script. 
          By attempting to address the chaos under artificial speed pressure, you bypass logical boundaries and execute hidden validation traps.
        `;
            }
            feedback.style.display = "block";
            resetSimulationInterface();
        }

        function resetSimulationInterface() {
            controls.innerHTML = `<button class="btn" onclick="startStorm()">Restart Storm Cascade</button>`;
            setTimeout(sendHeightUpdate, 50);
        }
    </script>
</body>

</html>
