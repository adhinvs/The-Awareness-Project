<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Right Help Finder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f7f4;
    color: #1a1a1a;
    padding: 1.5rem 1rem 2.5rem;
  }

  .wrap { max-width: 680px; margin: 0 auto; }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #555; line-height: 1.6; }

  .situation-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }

  .situation-btn {
    background: #fff;
    border: 1.5px solid #e0dcd5;
    border-radius: 10px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.45;
    transition: border-color 0.15s, background 0.15s;
  }
  .situation-btn:hover { border-color: #b05020; background: #fdf9f6; }
  .situation-btn.active { border-color: #b05020; background: #fdf9f6; }

  .result-panel {
    display: none;
    background: #fff;
    border: 1px solid #e0dcd5;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 1rem;
  }
  .result-panel.visible { display: block; }

  .result-heading {
    background: #b05020;
    color: #fff;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .result-body { padding: 0; }

  .result-step {
    padding: 14px 16px;
    border-bottom: 1px solid #f0ece6;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .result-step:last-child { border-bottom: none; }

  .step-num {
    background: #f0ece6;
    color: #b05020;
    font-size: 12px;
    font-weight: 700;
    border-radius: 50%;
    min-width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .step-content {}
  .step-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; font-weight: 600; margin-bottom: 4px; }
  .step-action { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
  .step-detail { font-size: 13px; color: #555; line-height: 1.5; }

  .back-btn {
    display: block;
    margin-top: 1rem;
    font-size: 13px;
    color: #777;
    background: none;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .back-btn:hover { background: #f0ece6; color: #1a1a1a; }

  .note {
    margin-top: 1rem;
    font-size: 12px;
    color: #888;
    line-height: 1.6;
    padding: 12px 14px;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e5e1da;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>The Right Help Finder</h1>
    <p>Select the situation closest to yours. The tool shows you the three most important next steps - no preamble.</p>
  </div>

  <div id="situation-screen">
    <div class="situation-list">
      <button class="situation-btn" onclick="showResult('threats')">Someone is sending me threatening or abusive messages</button>
      <button class="situation-btn" onclick="showResult('ncii')">Intimate images of me have been shared without my consent</button>
      <button class="situation-btn" onclick="showResult('stalking')">Someone I know is tracking or monitoring me</button>
      <button class="situation-btn" onclick="showResult('pile-on')">I am being targeted by a group online (harassment, doxxing)</button>
      <button class="situation-btn" onclick="showResult('reputation')">Someone is trying to damage my reputation online</button>
    </div>

    <div class="note">This tool does not store any information. If you are in immediate physical danger, call your local emergency number first.</div>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="result-heading" id="result-heading"></div>
    <div class="result-body" id="result-body"></div>
  </div>

  <button class="back-btn" id="back-btn" style="display:none" onclick="goBack()">Back to situations</button>

</div>

<script>
const RESULTS = {
  threats: {
    heading: "Threatening or abusive messages",
    steps: [
      {
        label: "Platform action",
        action: "Block and report immediately",
        detail: "Screenshot the threats first - you need them as evidence. Then block and report using the three-dot menu on the message or profile. Do not respond."
      },
      {
        label: "Law enforcement",
        action: "Report to your national cybercrime authority",
        detail: "IN: cybercrime.gov.in | UK: Action Fraud (actionfraud.police.uk) | US: FBI IC3 (ic3.gov) | AU: ReportCyber (cyber.gov.au). Bring screenshots. You do not need to know who is doing it to file a report."
      },
      {
        label: "Support",
        action: "Connect with a digital safety helpline",
        detail: "IN: iCall (+91 9152987821) | UK: Revenge Porn Helpline (revengepornhelpline.org.uk) | US: Cyber Civil Rights Initiative (cybercivilrights.org, 844-878-2274) | Global: End Violence Against Women International (evawintl.org)"
      }
    ]
  },
  ncii: {
    heading: "Non-consensual intimate images",
    steps: [
      {
        label: "Platform removal",
        action: "Use StopNCII.org to remove images across platforms",
        detail: "StopNCII creates a fingerprint of the image - without uploading it - then blocks sharing across Meta, TikTok, Reddit, Snapchat, and others. Free and confidential."
      },
      {
        label: "Law enforcement",
        action: "Report to police - it is a criminal offence in most countries",
        detail: "IN: File an FIR under IT Act s.66E and IPC 354C | UK: Contact police - sharing intimate images is a criminal offence under the Online Safety Act 2023 | US: Contact your state attorney general - 48 states have criminalised NCII | AU: Report to eSafety Commissioner (esafety.gov.au)"
      },
      {
        label: "Support",
        action: "Speak to a specialist support organisation",
        detail: "UK: Revenge Porn Helpline (0345 600 0459) | US: CCRI Crisis Line (844-878-2274) | IN: iCall or Vanitha Helpline (1091) | Global: Without My Consent (withoutmyconsent.org). These organisations can also advise on legal options."
      }
    ]
  },
  stalking: {
    heading: "Being tracked or monitored by someone you know",
    steps: [
      {
        label: "Immediate safety",
        action: "Audit your accounts and devices before confronting anyone",
        detail: "Do not alert the person - this can escalate risk. Use a device they have not touched to check: shared accounts, location sharing (Google Maps, Find My, WhatsApp), and Settings > Apps for unfamiliar apps."
      },
      {
        label: "Law enforcement",
        action: "Report stalking behaviour to police with a written log",
        detail: "Document every incident with time, date, and description before reporting. IN: File complaint under IPC 354D | UK: Report to police - stalking is a criminal offence | US: Contact local police and check your state's stalking laws at victimsofcrime.org | AU: Contact local police or 1800RESPECT (1800 737 732)"
      },
      {
        label: "Support",
        action: "Contact a specialist domestic abuse or stalking helpline",
        detail: "UK: National Stalking Helpline (0808 802 0300) | US: Safety Net at NNEDV (nnedv.org/content/safety-net) | IN: iCall (+91 9152987821) or Vandrevala Foundation (1860-2662-345) | AU: 1800RESPECT (1800 737 732)"
      }
    ]
  },
  "pile-on": {
    heading: "Group harassment or doxxing",
    steps: [
      {
        label: "Document first",
        action: "Screenshot everything before reporting or responding",
        detail: "Screenshot usernames, post URLs, timestamps, and any personal information shared - content disappears after reports are filed. Do not engage; responses become more content."
      },
      {
        label: "Platform and law enforcement",
        action: "Report coordinated harassment and file a cybercrime report",
        detail: "File platform reports for each account involved - emphasise 'coordinated inauthentic behaviour.' For doxxing (sharing your personal info publicly): IN: cybercrime.gov.in | UK: Action Fraud | US: FBI IC3 (ic3.gov) or your local police for immediate risk | AU: eSafety Commissioner (esafety.gov.au)"
      },
      {
        label: "Support",
        action: "Contact an online harassment support organisation",
        detail: "PEN America's Online Harassment Field Manual (pen.org) has platform-specific reporting guides. If your address was published, request data broker removal (DeleteMe or similar)."
      }
    ]
  },
  reputation: {
    heading: "Reputational damage or false information",
    steps: [
      {
        label: "Document and assess",
        action: "Screenshot and record everything before taking action",
        detail: "Save the content, the URL, and who posted it. Do not delete your own content - it may be needed for legal action."
      },
      {
        label: "Platform removal",
        action: "File a defamation or false information report with the platform",
        detail: "Most platforms have reports for false information or impersonation. Also request Google search removal at google.com/webmasters/tools/legal-removal-request."
      },
      {
        label: "Legal and support options",
        action: "Consult a legal professional about defamation or harassment",
        detail: "IN: Cyber cell or consult a digital rights lawyer (Internet Freedom Foundation: internetfreedom.in) | UK: Defamation Lawyers Association or Solicitors Regulation Authority | US: Electronic Frontier Foundation (eff.org) | Global: Access Now digital helpline (accessnow.org/help) offers free support for at-risk individuals."
      }
    ]
  }
};

function showResult(key) {
  const data = RESULTS[key];
  document.getElementById('situation-screen').style.display = 'none';
  const panel = document.getElementById('result-panel');
  document.getElementById('result-heading').textContent = data.heading;
  const body = document.getElementById('result-body');
  body.innerHTML = data.steps.map((s, i) => `
    <div class="result-step">
      <div class="step-num">${i + 1}</div>
      <div class="step-content">
        <div class="step-label">${s.label}</div>
        <div class="step-action">${s.action}</div>
        <div class="step-detail">${s.detail}</div>
      </div>
    </div>
  `).join('');
  panel.classList.add('visible');
  document.getElementById('back-btn').style.display = 'block';
  sendHeight();
}

function goBack() {
  document.getElementById('situation-screen').style.display = 'block';
  document.getElementById('result-panel').classList.remove('visible');
  document.getElementById('back-btn').style.display = 'none';
  sendHeight();
}

function sendHeight() {
  setTimeout(() => {
    if (window.parent) {
      window.parent.postMessage({ iframeHeight: document.documentElement.scrollHeight + 20 }, '*');
    }
  }, 50);
}

sendHeight();
</script>
</body>
</html>
