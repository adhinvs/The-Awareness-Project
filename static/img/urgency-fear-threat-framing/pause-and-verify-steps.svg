<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <rect width="800" height="340" fill="#f6f5f3" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="15" fill="#1a1a18" text-anchor="middle" font-weight="600">The Pause-and-Verify Rule</text>
  <text x="400" y="55" font-family="system-ui,sans-serif" font-size="12" fill="#888780" text-anchor="middle">Six steps that break every urgency trap</text>

  <!-- Step cards - row 1 -->
  <!-- Step 1 -->
  <rect x="30" y="72" width="232" height="110" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <circle cx="56" cy="96" r="16" fill="#1a1a18"/>
  <text x="56" y="101" font-family="system-ui,sans-serif" font-size="13" fill="#f1efe8" text-anchor="middle" font-weight="700">1</text>
  <text x="82" y="91" font-family="system-ui,sans-serif" font-size="12" fill="#1a1a18" font-weight="600">Stop</text>
  <text x="44" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Do not click, call, or</text>
  <text x="44" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">transfer anything.</text>
  <text x="44" y="154" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Put the phone down.</text>
  <text x="44" y="171" font-family="system-ui,sans-serif" font-size="10" fill="#888780" font-style="italic">60 seconds changes everything.</text>

  <!-- Step 2 -->
  <rect x="284" y="72" width="232" height="110" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <circle cx="310" cy="96" r="16" fill="#1a1a18"/>
  <text x="310" y="101" font-family="system-ui,sans-serif" font-size="13" fill="#f1efe8" text-anchor="middle" font-weight="700">2</text>
  <text x="336" y="91" font-family="system-ui,sans-serif" font-size="12" fill="#1a1a18" font-weight="600">Name it</text>
  <text x="298" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Say it out loud: "This</text>
  <text x="298" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">is trying to rush me."</text>
  <text x="298" y="154" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Naming it reduces power.</text>
  <text x="298" y="171" font-family="system-ui,sans-serif" font-size="10" fill="#888780" font-style="italic">Awareness breaks the hijack.</text>

  <!-- Step 3 -->
  <rect x="538" y="72" width="232" height="110" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <circle cx="564" cy="96" r="16" fill="#1a1a18"/>
  <text x="564" y="101" font-family="system-ui,sans-serif" font-size="13" fill="#f1efe8" text-anchor="middle" font-weight="700">3</text>
  <text x="590" y="91" font-family="system-ui,sans-serif" font-size="12" fill="#1a1a18" font-weight="600">Verify independently</text>
  <text x="552" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Find the real number</text>
  <text x="552" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">yourself. Call the official</text>
  <text x="552" y="154" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">helpline, not theirs.</text>
  <text x="552" y="171" font-family="system-ui,sans-serif" font-size="10" fill="#888780" font-style="italic">Never use numbers they provide.</text>

  <!-- Row 2 -->
  <!-- Step 4 -->
  <rect x="30" y="196" width="232" height="110" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <circle cx="56" cy="220" r="16" fill="#1a1a18"/>
  <text x="56" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#f1efe8" text-anchor="middle" font-weight="700">4</text>
  <text x="82" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#1a1a18" font-weight="600">Tell someone</text>
  <text x="44" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">A trusted person nearby</text>
  <text x="44" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">breaks the isolation the</text>
  <text x="44" y="278" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">scammer depends on.</text>
  <text x="44" y="295" font-family="system-ui,sans-serif" font-size="10" fill="#888780" font-style="italic">"Do not tell anyone" = red flag.</text>

  <!-- Step 5 -->
  <rect x="284" y="196" width="232" height="110" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <circle cx="310" cy="220" r="16" fill="#1a1a18"/>
  <text x="310" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#f1efe8" text-anchor="middle" font-weight="700">5</text>
  <text x="336" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#1a1a18" font-weight="600">Check the source</text>
  <text x="298" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Hover the email address.</text>
  <text x="298" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Check the actual URL.</text>
  <text x="298" y="278" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Verify the SMS sender ID.</text>
  <text x="298" y="295" font-family="system-ui,sans-serif" font-size="10" fill="#888780" font-style="italic">Display name is not the sender.</text>

  <!-- Step 6 -->
  <rect x="538" y="196" width="232" height="110" rx="12" fill="#eaf3de" stroke="#639922" stroke-width="1"/>
  <circle cx="564" cy="220" r="16" fill="#3b6d11"/>
  <text x="564" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#f1efe8" text-anchor="middle" font-weight="700">6</text>
  <text x="590" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#27500a" font-weight="600">Report it</text>
  <text x="552" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#27500a">Report to protect others</text>
  <text x="552" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#27500a">from the same scam.</text>
  <text x="552" y="282" font-family="system-ui,sans-serif" font-size="11" fill="#27500a" font-weight="500">cybercrime.gov.in</text>
  <text x="552" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#27500a" font-weight="500">Helpline: 1930</text>
</svg>
