<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <rect width="800" height="340" fill="#f6f5f3" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia,serif" font-size="15" fill="#1a1a18" text-anchor="middle" font-weight="600">The Verification Window</text>
  <text x="400" y="58" font-family="system-ui,sans-serif" font-size="12" fill="#888780" text-anchor="middle">How much time do you actually have to verify?</text>

  <!-- LEFT: Scammer side -->
  <rect x="40" y="76" width="330" height="230" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <rect x="40" y="76" width="330" height="36" rx="12" fill="#fcebeb"/>
  <rect x="40" y="100" width="330" height="12" rx="0" fill="#fcebeb"/>
  <text x="205" y="100" font-family="system-ui,sans-serif" font-size="12.5" fill="#a32d2d" text-anchor="middle" font-weight="600">Scam Message</text>

  <!-- Fake countdown bar -->
  <text x="65" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Time given to respond</text>
  <rect x="65" y="148" width="280" height="14" rx="7" fill="#f0eeec"/>
  <rect x="65" y="148" width="56" height="14" rx="7" fill="#e24b4a"/>
  <text x="130" y="160" font-family="system-ui,sans-serif" font-size="10" fill="#888780">2 hours</text>

  <!-- What happens in 2 hours list -->
  <text x="65" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a" font-weight="500">In 2 hours, can you...</text>
  <text x="72" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#a32d2d">✗  Find the bank's real number</text>
  <text x="72" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#a32d2d">✗  Log in to verify the alert</text>
  <text x="72" y="244" font-family="system-ui,sans-serif" font-size="11" fill="#a32d2d">✗  Ask a trusted person</text>
  <text x="72" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#a32d2d">✗  Think clearly under pressure</text>
  <text x="65" y="288" font-family="system-ui,sans-serif" font-size="10.5" fill="#a32d2d" font-style="italic">Deadline is designed to stop all of the above.</text>

  <!-- RIGHT: Real bank side -->
  <rect x="430" y="76" width="330" height="230" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <rect x="430" y="76" width="330" height="36" rx="12" fill="#eaf3de"/>
  <rect x="430" y="100" width="330" height="12" rx="0" fill="#eaf3de"/>
  <text x="595" y="100" font-family="system-ui,sans-serif" font-size="12.5" fill="#3b6d11" text-anchor="middle" font-weight="600">Real Bank Notice</text>

  <!-- Real time bar -->
  <text x="455" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a">Time given to respond</text>
  <rect x="455" y="148" width="280" height="14" rx="7" fill="#f0eeec"/>
  <rect x="455" y="148" width="252" height="14" rx="7" fill="#639922"/>
  <text x="600" y="160" font-family="system-ui,sans-serif" font-size="10" fill="#ffffff">30 days (formal notice)</text>

  <!-- What happens with 30 days -->
  <text x="455" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#5f5e5a" font-weight="500">With proper notice, you can...</text>
  <text x="462" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#3b6d11">✓  Contact your branch directly</text>
  <text x="462" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#3b6d11">✓  Verify through the official app</text>
  <text x="462" y="244" font-family="system-ui,sans-serif" font-size="11" fill="#3b6d11">✓  Consult a family member</text>
  <text x="462" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#3b6d11">✓  Seek advice if needed</text>
  <text x="455" y="288" font-family="system-ui,sans-serif" font-size="10.5" fill="#3b6d11" font-style="italic">Real institutions never need you to panic.</text>

  <!-- VS divider -->
  <circle cx="400" cy="192" r="18" fill="#1a1a18"/>
  <text x="400" y="197" font-family="system-ui,sans-serif" font-size="12" fill="#f1efe8" text-anchor="middle" font-weight="600">VS</text>
</svg>
