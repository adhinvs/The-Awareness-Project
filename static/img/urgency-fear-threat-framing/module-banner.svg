<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f5f3"/>
      <stop offset="100%" stop-color="#eeedfe"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1efe8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bgGrad)" rx="0"/>

  <!-- Decorative soft circles -->
  <circle cx="980" cy="80" r="160" fill="#afa9ec" opacity="0.12"/>
  <circle cx="1100" cy="400" r="120" fill="#9fe1cb" opacity="0.10"/>
  <circle cx="80" cy="380" r="100" fill="#afa9ec" opacity="0.08"/>

  <!-- Left: text block -->
  <text x="80" y="130" font-family="Georgia, serif" font-size="13" fill="#888780" letter-spacing="2" font-weight="400">SECTION 2 · SOCIAL ENGINEERING</text>
  <text x="80" y="195" font-family="Georgia, serif" font-size="46" fill="#1a1a18" font-weight="600" letter-spacing="-0.5">Urgency, Fear</text>
  <text x="80" y="255" font-family="Georgia, serif" font-size="46" fill="#1a1a18" font-weight="600" letter-spacing="-0.5">&amp; Threat Framing</text>
  <text x="80" y="310" font-family="Georgia, serif" font-size="18" fill="#5f5e5a" font-style="italic">Module 6 · The Awareness Project</text>

  <!-- Tag pills -->
  <rect x="80" y="345" width="130" height="30" rx="15" fill="#eeedfe"/>
  <text x="145" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#534ab7" text-anchor="middle" font-weight="500">Social Engineering</text>

  <rect x="222" y="345" width="90" height="30" rx="15" fill="#e1f5ee"/>
  <text x="267" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#0f6e56" text-anchor="middle" font-weight="500">Scam Tactics</text>

  <rect x="324" y="345" width="70" height="30" rx="15" fill="#faeeda"/>
  <text x="359" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#854f0b" text-anchor="middle" font-weight="500">Phishing</text>

  <!-- Right: phone mockup -->
  <rect x="740" y="60" width="200" height="360" rx="22" fill="#1a1a18"/>
  <rect x="748" y="68" width="184" height="344" rx="16" fill="url(#phoneGrad)"/>

  <!-- Notch -->
  <rect x="820" y="72" width="60" height="14" rx="7" fill="#1a1a18"/>

  <!-- Message 1 - suspicious alert -->
  <rect x="760" y="105" width="160" height="72" rx="10" fill="#fcebeb"/>
  <text x="770" y="122" font-family="system-ui, sans-serif" font-size="9" fill="#a32d2d" font-weight="600">⚠ ACCOUNT ALERT</text>
  <text x="770" y="137" font-family="system-ui, sans-serif" font-size="8.5" fill="#791f1f">Your account will be</text>
  <text x="770" y="149" font-family="system-ui, sans-serif" font-size="8.5" fill="#791f1f">locked in 2 hours.</text>
  <text x="770" y="161" font-family="system-ui, sans-serif" font-size="8.5" fill="#791f1f">Verify now →</text>
  <text x="900" y="170" font-family="system-ui, sans-serif" font-size="8" fill="#b4b2a9">09:41</text>

  <!-- Message 2 - calm real bank -->
  <rect x="760" y="190" width="160" height="60" rx="10" fill="#e1f5ee"/>
  <text x="770" y="207" font-family="system-ui, sans-serif" font-size="9" fill="#085041" font-weight="600">Your Bank</text>
  <text x="770" y="220" font-family="system-ui, sans-serif" font-size="8.5" fill="#0f6e56">Transaction of Rs 500</text>
  <text x="770" y="232" font-family="system-ui, sans-serif" font-size="8.5" fill="#0f6e56">processed. Ref: 8821</text>
  <text x="900" y="242" font-family="system-ui, sans-serif" font-size="8" fill="#b4b2a9">09:45</span></text>

  <!-- Label: scam vs real -->
  <rect x="760" y="268" width="60" height="18" rx="5" fill="#fcebeb"/>
  <text x="790" y="281" font-family="system-ui, sans-serif" font-size="8" fill="#a32d2d" text-anchor="middle" font-weight="600">SCAM</text>

  <rect x="832" y="268" width="50" height="18" rx="5" fill="#e1f5ee"/>
  <text x="857" y="281" font-family="system-ui, sans-serif" font-size="8" fill="#085041" text-anchor="middle" font-weight="600">REAL</text>

  <!-- Bottom label -->
  <text x="840" y="370" font-family="system-ui, sans-serif" font-size="8.5" fill="#888780" text-anchor="middle">Can you tell the difference?</text>

  <!-- Home indicator -->
  <rect x="810" y="388" width="60" height="4" rx="2" fill="#b4b2a9"/>
</svg>
