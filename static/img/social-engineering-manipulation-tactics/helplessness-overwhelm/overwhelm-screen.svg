<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="#f6f5f3" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui,sans-serif" font-size="15" fill="#1a1a18" text-anchor="middle" font-weight="600">How Overwhelm Is Engineered</text>
  <text x="400" y="54" font-family="system-ui,sans-serif" font-size="12" fill="#888780" text-anchor="middle">Every alert is artificial. The panic it causes is real.</text>

  <!-- Laptop outline -->
  <rect x="200" y="72" width="400" height="240" rx="12" fill="#e8e6e2" stroke="#d0cec9" stroke-width="2"/>
  <rect x="215" y="84" width="370" height="210" rx="6" fill="#1e2433"/>
  <!-- Screen base -->
  <rect x="150" y="312" width="500" height="16" rx="4" fill="#d0cec9"/>
  <ellipse cx="400" cy="312" rx="40" ry="4" fill="#c8c6c2"/>

  <!-- Normal desktop (behind alerts) -->
  <rect x="215" y="84" width="370" height="210" rx="6" fill="#2a3550"/>
  <text x="400" y="186" font-family="system-ui,sans-serif" font-size="11" fill="#5a6a8a" text-anchor="middle">Normal work</text>

  <!-- Alert 1 - bottom left -->
  <rect x="228" y="168" width="180" height="110" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <rect x="228" y="168" width="180" height="28" rx="8" fill="#fca5a5"/>
  <rect x="228" y="184" width="180" height="12" fill="#fca5a5"/>
  <text x="318" y="184" font-family="system-ui,sans-serif" font-size="10.5" fill="#991b1b" text-anchor="middle" font-weight="700">⚠ CRITICAL ALERT</text>
  <text x="318" y="215" font-family="system-ui,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle">Your device is compromised.</text>
  <text x="318" y="229" font-family="system-ui,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle">Immediate action required.</text>
  <rect x="258" y="250" width="120" height="22" rx="5" fill="#ef4444"/>
  <text x="318" y="265" font-family="system-ui,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Call Support Now</text>

  <!-- Alert 2 - top right -->
  <rect x="360" y="90" width="200" height="100" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="360" y="90" width="200" height="26" rx="8" fill="#fde68a"/>
  <rect x="360" y="104" width="200" height="12" fill="#fde68a"/>
  <text x="460" y="104" font-family="system-ui,sans-serif" font-size="10.5" fill="#92400e" text-anchor="middle" font-weight="700">SECURITY WARNING</text>
  <text x="460" y="130" font-family="system-ui,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle">Unauthorised access detected.</text>
  <text x="460" y="145" font-family="system-ui,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle">Your bank data may be at risk.</text>
  <rect x="400" y="158" width="120" height="20" rx="5" fill="#f59e0b"/>
  <text x="460" y="172" font-family="system-ui,sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="600">Secure Account</text>

  <!-- Alert 3 - centre -->
  <rect x="290" y="130" width="210" height="90" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
  <rect x="290" y="130" width="210" height="26" rx="8" fill="#fee2e2"/>
  <rect x="290" y="144" width="210" height="12" fill="#fee2e2"/>
  <text x="395" y="144" font-family="system-ui,sans-serif" font-size="10.5" fill="#991b1b" text-anchor="middle" font-weight="700">🔒 SYSTEM LOCKED</text>
  <text x="395" y="172" font-family="system-ui,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle">5 threats detected. Do not</text>
  <text x="395" y="186" font-family="system-ui,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle">turn off your computer.</text>
  <rect x="335" y="198" width="120" height="18" rx="5" fill="#dc2626"/>
  <text x="395" y="211" font-family="system-ui,sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="600">1800-SUPPORT</text>

  <!-- Label: What is real -->
  <rect x="40" y="108" width="148" height="60" rx="8" fill="#EEF7E8" stroke="#86efac" stroke-width="1.5"/>
  <text x="114" y="130" font-family="system-ui,sans-serif" font-size="10.5" fill="#15803d" text-anchor="middle" font-weight="600">What is real:</text>
  <text x="114" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">A browser webpage.</text>
  <text x="114" y="162" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">Close the tab. Done.</text>

  <!-- Arrow from label to laptop -->
  <path d="M 188 138 L 215 170" stroke="#86efac" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- Label: What you feel -->
  <rect x="612" y="108" width="148" height="60" rx="8" fill="#FEE2E2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="686" y="130" font-family="system-ui,sans-serif" font-size="10.5" fill="#991b1b" text-anchor="middle" font-weight="600">What you feel:</text>
  <text x="686" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">System emergency.</text>
  <text x="686" y="162" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">Must call. Now.</text>

  <!-- Arrow from label to laptop -->
  <path d="M 612 138 L 585 170" stroke="#fca5a5" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- Bottom note -->
  <rect x="160" y="342" width="480" height="14" rx="4" fill="none"/>
  <text x="400" y="354" font-family="system-ui,sans-serif" font-size="10.5" fill="#888780" text-anchor="middle">The panic is designed. The solution they offer is the attack.</text>

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#86efac"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fca5a5"/>
    </marker>
  </defs>
</svg>
