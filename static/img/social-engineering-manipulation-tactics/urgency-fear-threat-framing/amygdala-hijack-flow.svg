<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="#f6f5f3" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia,serif" font-size="15" fill="#1a1a18" text-anchor="middle" font-weight="600">The Amygdala Hijack Flow</text>
  <text x="400" y="58" font-family="system-ui,sans-serif" font-size="12" fill="#888780" text-anchor="middle">How manufactured urgency shortcuts the brain's safety checks</text>

  <!-- STIMULUS: Input -->
  <rect x="40" y="115" width="180" height="130" rx="12" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <rect x="40" y="115" width="180" height="30" rx="12" fill="#f0eeec"/>
  <rect x="40" y="133" width="180" height="12" rx="0" fill="#f0eeec"/>
  <text x="130" y="134" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a18" font-weight="600" text-anchor="middle">1. Threat Stimulus</text>
  
  <rect x="52" y="157" width="156" height="72" rx="6" fill="#fcfbf9" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <text x="62" y="176" font-family="system-ui,sans-serif" font-size="9.5" fill="#a32d2d" font-style="italic">"URGENT: Arrest warrant"</text>
  <text x="62" y="193" font-family="system-ui,sans-serif" font-size="9.5" fill="#a32d2d" font-style="italic">"or account suspension."</text>
  <text x="62" y="210" font-family="system-ui,sans-serif" font-size="8.5" fill="#888780">Emotion: High Panic</text>

  <!-- PATHWAYS (Flow arrows) -->
  <!-- Top Path (High Road) -->
  <path d="M 230,160 Q 260,120 280,120" fill="none" stroke="#639922" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Bottom Path (Low Road) -->
  <path d="M 230,200 Q 260,240 280,240" fill="none" stroke="#e24b4a" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Marker definitions for arrows -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#639922"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e24b4a"/>
    </marker>
  </defs>

  <!-- TOP CARD: Prefrontal Cortex -->
  <rect x="290" y="80" width="210" height="80" rx="12" fill="#ffffff" stroke="#eaf3de" stroke-width="1.5"/>
  <text x="395" y="104" font-family="system-ui,sans-serif" font-size="12" fill="#3b6d11" text-anchor="middle" font-weight="600">Prefrontal Cortex (High Road)</text>
  <text x="395" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#5f5e5a" text-anchor="middle">Logical analysis &amp; critical evaluation</text>
  <text x="395" y="139" font-family="system-ui,sans-serif" font-size="10" fill="#888780" text-anchor="middle">Takes time (seconds to minutes)</text>

  <!-- BOTTOM CARD: Amygdala -->
  <rect x="290" y="200" width="210" height="80" rx="12" fill="#ffffff" stroke="#fcebeb" stroke-width="1.5"/>
  <text x="395" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#a32d2d" text-anchor="middle" font-weight="600">Amygdala (Low Road)</text>
  <text x="395" y="244" font-family="system-ui,sans-serif" font-size="10" fill="#5f5e5a" text-anchor="middle">Instant survival threat assessment</text>
  <text x="395" y="259" font-family="system-ui,sans-serif" font-size="10" fill="#888780" text-anchor="middle">Instant response (milliseconds)</text>

  <!-- Connectors to Outcomes -->
  <line x1="500" y1="120" x2="540" y2="120" stroke="#639922" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="500" y1="240" x2="540" y2="240" stroke="#e24b4a" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- TOP OUTCOME: Safe -->
  <rect x="550" y="80" width="210" height="80" rx="12" fill="#eaf3de" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
  <text x="655" y="112" font-family="system-ui,sans-serif" font-size="12.5" fill="#3b6d11" text-anchor="middle" font-weight="600">Pause &amp; Verify</text>
  <text x="655" y="132" font-family="system-ui,sans-serif" font-size="10" fill="#3b6d11" text-anchor="middle">Reasoning breaks the panic cycle</text>

  <!-- BOTTOM OUTCOME: Hijack Success -->
  <rect x="550" y="200" width="210" height="80" rx="12" fill="#fcebeb" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
  <text x="655" y="212" font-family="system-ui,sans-serif" font-size="12.5" fill="#a32d2d" text-anchor="middle" font-weight="600">Amygdala Hijack</text>
  <text x="655" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#a32d2d" text-anchor="middle">Action taken before logic can run</text>

  <!-- Crux label / overlay -->
  <rect x="235" y="162" width="150" height="36" rx="6" fill="#1a1a18"/>
  <text x="310" y="177" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="600">MANUFACTURED URGENCY</text>
  <text x="310" y="190" font-family="system-ui,sans-serif" font-size="8.5" fill="#e24b4a" text-anchor="middle" font-weight="600">forces the bottom path</text>
</svg>
