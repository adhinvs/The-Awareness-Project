<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <rect width="800" height="380" fill="#f6f5f3" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui,sans-serif" font-size="15" fill="#1a1a18" text-anchor="middle" font-weight="600">The Commitment Ladder</text>
  <text x="400" y="54" font-family="system-ui,sans-serif" font-size="12" fill="#888780" text-anchor="middle">Each step feels reasonable. Together they build a trap.</text>

  <!-- Staircase steps - going up left to right -->
  <!-- Step 1: bottom left -->
  <rect x="60" y="292" width="120" height="44" rx="6" fill="#EEF7E8" stroke="#86efac" stroke-width="1.5"/>
  <text x="120" y="311" font-family="system-ui,sans-serif" font-size="10.5" fill="#15803d" text-anchor="middle" font-weight="600">Free Signup</text>
  <text x="120" y="327" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">Harmless. No risk.</text>

  <!-- Step 2 -->
  <rect x="190" y="252" width="120" height="44" rx="6" fill="#FEF9C3" stroke="#fde047" stroke-width="1.5"/>
  <text x="250" y="271" font-family="system-ui,sans-serif" font-size="10.5" fill="#854d0e" text-anchor="middle" font-weight="600">Webinar</text>
  <text x="250" y="287" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">Just time. Feels fine.</text>

  <!-- Step 3 -->
  <rect x="320" y="212" width="120" height="44" rx="6" fill="#FEF3C7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="380" y="231" font-family="system-ui,sans-serif" font-size="10.5" fill="#92400e" text-anchor="middle" font-weight="600">Community</text>
  <text x="380" y="247" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">More time. Still OK.</text>

  <!-- Step 4 -->
  <rect x="450" y="172" width="120" height="44" rx="6" fill="#FFEDD5" stroke="#fb923c" stroke-width="1.5"/>
  <text x="510" y="191" font-family="system-ui,sans-serif" font-size="10.5" fill="#9a3412" text-anchor="middle" font-weight="600">Certificate</text>
  <text x="510" y="207" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">Small fee. Committed now.</text>

  <!-- Step 5 -->
  <rect x="580" y="132" width="120" height="44" rx="6" fill="#FEE2E2" stroke="#f87171" stroke-width="1.5"/>
  <text x="640" y="151" font-family="system-ui,sans-serif" font-size="10.5" fill="#991b1b" text-anchor="middle" font-weight="600">Premium Tier</text>
  <text x="640" y="167" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">"Can't stop now."</text>

  <!-- Step 6: off the top - the trap -->
  <rect x="580" y="72" width="120" height="44" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="640" y="91" font-family="system-ui,sans-serif" font-size="10.5" fill="#dc2626" text-anchor="middle" font-weight="700">Next Fee...</text>
  <text x="640" y="107" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">The exit never comes.</text>

  <!-- Staircase risers (vertical connectors) -->
  <line x1="180" y1="296" x2="190" y2="296" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="310" y1="256" x2="320" y2="256" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="440" y1="216" x2="450" y2="216" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="570" y1="176" x2="580" y2="176" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Vertical step connection 5-6 -->
  <line x1="640" y1="132" x2="640" y2="116" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Sunk cost label on left -->
  <rect x="40" y="155" width="148" height="76" rx="8" fill="#FEE2E2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="114" y="176" font-family="system-ui,sans-serif" font-size="10.5" fill="#991b1b" text-anchor="middle" font-weight="600">The sunk cost trap</text>
  <text x="114" y="194" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">"I've already paid this</text>
  <text x="114" y="209" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">much. Stopping now</text>
  <text x="114" y="224" font-family="system-ui,sans-serif" font-size="10" fill="#374151" text-anchor="middle">would waste it all."</text>

  <!-- Arrow from sunk cost to ladder -->
  <path d="M 188 195 L 450 195" stroke="#fca5a5" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>

  <!-- Bottom note -->
  <text x="400" y="364" font-family="system-ui,sans-serif" font-size="10.5" fill="#888780" text-anchor="middle">Past investment is gone regardless of your next decision. Evaluate each step from zero.</text>

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fca5a5"/>
    </marker>
  </defs>
</svg>
